services:
  - type: web
    name: react-portfolio
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    headers:
      - path: /static/*
        name: Content-Type
        value: application/javascript
      - path: /static/css/*
        name: Content-Type
        value: text/css
    routes:
      - type: rewrite
        source: /*
        destination: /index.html